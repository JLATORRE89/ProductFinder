# Test profile: use in-memory H2 so tests don't touch the file-based DB
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=TRUE
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=false

# Short-lived token for tests
app.jwt.expiration-ms=60000
app.jwt.secret=TestSecretKeyForJwtThatIsLongEnough32Chars!
