# ======================================================
# ProductFinder — application.properties
# HTTP-only, runs on localhost:8080 out of the box.
# No TLS, no forced HTTPS redirects.
# ======================================================

# Server — HTTP only, port 8080
server.port=8080

# -------------------------------------------------------
# H2 file-based database (persists between restarts)
# Data is stored in ./productfinder-data.mv.db
# -------------------------------------------------------
spring.datasource.url=jdbc:h2:file:./productfinder-data;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 web console — http://localhost:8080/h2-console  (dev convenience)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# -------------------------------------------------------
# Thymeleaf
# -------------------------------------------------------
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# -------------------------------------------------------
# JWT
# IMPORTANT: Change app.jwt.secret before deploying anywhere.
# Must be >= 32 characters (256 bits for HS256).
# -------------------------------------------------------
app.jwt.secret=ProductFinder-Change-This-Secret-Key-At-Least-32-Chars!
app.jwt.expiration-ms=1800000

# -------------------------------------------------------
# Walmart scraper settings
# -------------------------------------------------------
app.scraper.user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36
app.scraper.timeout-ms=12000
app.scraper.max-results=20
app.scraper.base-url=https://www.walmart.com

# -------------------------------------------------------
# Logging
# -------------------------------------------------------
logging.level.com.productfinder=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{36} - %msg%n
